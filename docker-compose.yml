name: proxy-dev

services:

  postgres:
    container_name: ${CONTAINER_NAME:-proxydev}-postgres
    build:
      context: ./docker/postgres
      args:
        - POSTGRES_VERSION=${POSTGRES_VERSION:-18}
    restart: always
    hostname: postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proxydev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proxydev}
      POSTGRES_DB: ${POSTGRES_DB:-proxydev}
      TZ: ${CONTAINER_TIMEZONE:-America/Sao_Paulo}
      PGTZ: ${CONTAINER_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - proxydev_postgresql:/var/lib/postgresql
    ports:
      - "${POSTGRES_DB_PORT:-5432}:5432"
    networks:
      - jp-networks

  mysql:
    container_name: ${CONTAINER_NAME:-proxydev}-mysql
    build:
      context: ./docker/mysql
      args:
        - MYSQL_VERSION=${MYSQL_VERSION:-8.0.32}
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proxydev}
      MYSQL_USER: ${MYSQL_USER:-proxydev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-proxydev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: ${CONTAINER_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - proxydev_mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "${MYSQL_DB_PORT:-3306}:3306"
    networks:
      - jp-networks

  redis:
    container_name: ${CONTAINER_NAME:-proxydev}-redis
    build:
      context: ./docker/redis
    restart: always
    volumes:
      - proxydev_redis:/data
      - ${REDIS_LOG_PATH:-./docker/logs/redis}:/var/log/redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-proxydev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - jp-networks

  mailpit:
    container_name: ${CONTAINER_NAME:-proxydev}-mailpit
    build:
      context: ./docker/mailpit
    restart: always
    ports:
      - '${MAILTIP_PORT:-1025}:1025'
      - '${MAILTIP_PORT_DASHBOARD:-8025}:8025'
    networks:
      - jp-networks
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 8M

  caddy:
    container_name: ${CONTAINER_NAME:-proxydev}-caddy
    build:
      context: ./docker/caddy
    restart: always
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - proxydev_caddy_data:/data
    ports:
      - "${CADDY_PORT:-80}:80"
      - "${CADDY_TLS_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jp-networks

  durabull:
    container_name: ${CONTAINER_NAME:-proxydev}-durabull
    build:
      context: ./docker/durabull
    restart: always
    depends_on:
      - redis
    environment:
      AUTH_SECRET: ${DURABULL_AUTH_SECRET:-durabull-secret}
      AUTHLESS: ${DURABULL_AUTHLESS:-true}
      APP_BASE_URL: ${DURABULL_APP_BASE_URL:-http://localhost:3030}
      RESEND_API_KEY: ${RESEND_API_KEY:-key_test_1234567890}
      VITE_PUBLIC_APP_URL: ${DURABULL_APP_BASE_URL:-http://localhost:3030}
      DURABULL_ENV_CONNECTIONS: ${DURABULL_ENV_CONNECTIONS:-true}
      DURABULL_REDIS_URL_DEV: ${DURABULL_REDIS_URL_DEV:-redis://:${REDIS_PASSWORD:-proxydev}@redis:6379}
      DURABULL_REDIS_URL_DEV_ENVIRONMENT: ${DURABULL_REDIS_URL_DEV_ENVIRONMENT:-development}
      DURABULL_REDIS_URL_PROD: ${DURABULL_REDIS_URL_PROD:-redis://:pass@localhost:6380/0}
      DURABULL_REDIS_URL_PROD_ENVIRONMENT: ${DURABULL_REDIS_URL_PROD_ENVIRONMENT:-production}
      DURABULL_REDIS_URL_DEFAULT: ${DURABULL_REDIS_URL_DEFAULT:-DEV}
      DURABULL_REDIS_URL_ENCRYPTION_KEY: ${DURABULL_REDIS_URL_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      DURABULL_PGLITE_DIR: /app/data
      PORT: ${DURABULL_INTERNAL_PORT:-3030}
    volumes:
      - proxydev_durabull_data:/app/data
    ports:
      - "${DURABULL_PORT:-3030}:${DURABULL_INTERNAL_PORT:-3030}"
    networks:
      - jp-networks

networks:
  jp-networks:
    external: true

volumes:
  proxydev_mysql:
  proxydev_redis:
  proxydev_postgresql:
  proxydev_caddy_data:
  proxydev_durabull_data:
